version: '3.9'

# ═══════════════════════════════════════════════════════════════
# Abstrack MVP — 3 conteneurs
# Usage dev  : docker compose up
# Usage prod : docker compose --env-file .env up -d
# ═══════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       abstrack
      POSTGRES_USER:     abstrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U abstrack"]
      interval: 5s
      timeout:  3s
      retries:  10

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://abstrack:${POSTGRES_PASSWORD:-changeme}@postgres:5432/abstrack
      JWT_SECRET:   ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_SECRET: ${ADMIN_SECRET:?ADMIN_SECRET is required}
      CORS_ORIGIN:  ${CORS_ORIGIN:-http://localhost:3000}
      PORT:         3001
      NODE_ENV:     ${NODE_ENV:-production}
      LOG_LEVEL:    ${LOG_LEVEL:-info}
      ALPHA_WHALE_ETH:   ${ALPHA_WHALE_ETH:-5}
      ALPHA_BURST_SALES: ${ALPHA_BURST_SALES:-10}
    ports:
      - "3001:3001"
    healthcheck:
      test:     ["CMD", "node", "-e", "require('http').get('http://localhost:3001/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout:  5s
      retries:  3

  indexer:
    build:
      context:    ./indexer
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:      postgresql://abstrack:${POSTGRES_PASSWORD:-changeme}@postgres:5432/abstrack
      ABSTRACT_RPC_WSS:  ${ABSTRACT_RPC_WSS:?ABSTRACT_RPC_WSS is required}
      ABSTRACT_RPC_HTTP: ${ABSTRACT_RPC_HTTP:?ABSTRACT_RPC_HTTP is required}
      LOG_FORMAT:        ${LOG_FORMAT:-json}
      LOG_LEVEL:         ${LOG_LEVEL:-info}

volumes:
  pgdata:
