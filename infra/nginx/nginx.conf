# nginx.conf — Reverse proxy pour Abstrack (self-hosted production)
# TLS termination, routing, rate limiting, gzip, security headers

user  nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ─── Logging JSON ─────────────────────────────────────────────────────────
  log_format json escape=json
    '{"time":"$time_iso8601",'
    '"ip":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":"$status",'
    '"bytes":"$body_bytes_sent",'
    '"rt":"$request_time"}';

  access_log /var/log/nginx/access.log json;
  error_log  /var/log/nginx/error.log  warn;

  # ─── Performance ──────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_vary          on;
  gzip_types         text/plain application/json application/javascript text/css;
  gzip_min_length    1000;

  # ─── Security headers ─────────────────────────────────────────────────────
  add_header X-Frame-Options           DENY                            always;
  add_header X-Content-Type-Options    nosniff                         always;
  add_header X-XSS-Protection          "1; mode=block"                 always;
  add_header Referrer-Policy           strict-origin-when-cross-origin always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  server_tokens off;

  # ─── Rate limits ──────────────────────────────────────────────────────────
  limit_req_zone  $binary_remote_addr zone=api:10m rate=120r/m;
  limit_req_zone  $binary_remote_addr zone=ws:10m  rate=10r/m;
  limit_conn_zone $binary_remote_addr zone=perip:10m;

  # ─── Upstream : backend unique (API + WebSocket sur le même process) ───────
  upstream backend {
    least_conn;
    server backend:3001;
    keepalive 32;
  }

  upstream web {
    least_conn;
    server web:3000;
    keepalive 16;
  }

  # ─── HTTP → HTTPS redirect ────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ─── HTTPS ────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name abstrack.xyz www.abstrack.xyz;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── /ws → WebSocket (même backend que l'API) ───────────────────────────
    # WebSocket et REST sur le même Fastify — pas de service séparé
    location /ws {
      limit_req zone=ws burst=5 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;

      # Timeout long : connexions WS persistantes
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # ── /api/* + /admin/* + /healthz → Fastify backend ────────────────────
    location ~ ^/(api|admin|healthz) {
      limit_req  zone=api burst=20 nodelay;
      limit_conn perip 20;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      proxy_connect_timeout 5s;
      proxy_read_timeout    30s;
      proxy_send_timeout    30s;
    }

    # ── /_next/static → cache immuable ────────────────────────────────────
    location /_next/static/ {
      proxy_pass http://web;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── / → Next.js frontend ─────────────────────────────────────────────
    location / {
      proxy_pass         http://web;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }
  }
}
