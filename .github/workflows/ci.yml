name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Lint + Type check (Node.js monorepo)
  # ────────────────────────────────────────────────────────────────────────────
  lint-ts:
    name: Lint & Type Check (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM:  ${{ vars.TURBO_TEAM }}

  # ────────────────────────────────────────────────────────────────────────────
  # Tests Python (intelligence + alerts)
  # ────────────────────────────────────────────────────────────────────────────
  test-python:
    name: Test Python services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [intelligence, alerts]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - run: pip install -r requirements.txt fakeredis
      - run: pytest tests/ -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # Build Docker images (vérifie que les Dockerfiles compilent)
  # ────────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: services/api
          - service: realtime
            context: services/realtime
          - service: indexer
            context: services/indexer
          - service: intelligence
            context: services/intelligence
          - service: alerts
            context: services/alerts
          - service: web
            context: apps/web
            build-args: |
              NEXT_PUBLIC_API_URL=https://api.abstrack.xyz
              NEXT_PUBLIC_WS_URL=wss://ws.abstrack.xyz
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.context }}
          push:       false
          tags:       abstrack/${{ matrix.service }}:ci
          build-args: ${{ matrix.build-args || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Résumé CI — gate pour merge
  # ────────────────────────────────────────────────────────────────────────────
  ci-ok:
    name: CI OK
    needs: [lint-ts, test-python, build-images]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint-ts.result }}"       != "success" ]] ||
             [[ "${{ needs.test-python.result }}"   != "success" ]] ||
             [[ "${{ needs.build-images.result }}"  != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed ✓"
